services:
  - type: web
    name: smartspend-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL e.g. https://smartspend.vercel.app
    healthCheckPath: /
